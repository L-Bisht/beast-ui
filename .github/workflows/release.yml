name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to create the "Version Packages" PR
      pull-requests: write  # Required to open/update the "Version Packages" PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create Version PR or Publish to npm
        uses: changesets/action@v1
        with:
          # Command to run when publishing (after "Version Packages" PR is merged)
          publish: pnpm changeset:publish
          # Command to run when creating the version PR
          version: pnpm changeset:version
          # Title of the auto-generated "Version Packages" PR
          title: "chore: version packages"
          # Commit message used inside the "Version Packages" PR
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
